# 这是后端服务的守卫与路标。
# 需要它是因为容器随时会挂，Deployment 能自动拉起新容器，Service 能给你一个固定的内部访问名字（backend-svc）。

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1 # 单个节点，出问题方便调试
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # 占位符提示：把这里换成你的私有镜像仓库地址
          image: my-registry.com/mystudyplant/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: mystudyplant-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mystudyplant-secret
                  key: db-password
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: mystudyplant-config
                  key: SPRING_DATA_REDIS_HOST
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mystudyplant-secret
                  key: redis-password
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: backend